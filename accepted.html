<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>成功 ❤️</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>🎉 恭喜你 🎉</h1>

成功俘获我的心 ❤️

<script>

document.body.addEventListener(
'click',
function(){

document.getElementById(
'music'
).play();

},
{once:true}
);

function loveLetter(){

alert(
"💌 给最特别的你\n\n"+
"谢谢你的出现。\n\n"+
"愿未来每一天都能和你一起创造美好的回忆 ❤️"
"知道了吗 文意小可爱"
);

}

</script>

</body>
</html>
